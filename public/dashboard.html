<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - Sistema de Pagos</title>
    <link rel="stylesheet" href="css/styles.css">
    
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Bienvenido, <span id="user-name">...</span></h1>
            <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        </div>

        <div id="admin-section" class="admin-only">
            <h3>Gestión de Clientes (Solo Admin)</h3>
            <div class="actions">
                <button class="btn-add" onclick="mostrarFormularioCliente()">+ Agregar Nuevo Cliente</button>
            </div>
        </div>

        <div class="main-section">
            <h3>Clientes Registrados</h3>
            <table id="tabla-clientes">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="lista-clientes-body">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="modalCliente" class="modal hidden">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">&times;</span>
            <h2>Nuevo Cliente</h2>
            <form id="formCliente">
                <label>Nombre Completo:</label>
                <input type="text" id="nom_cli" placeholder="Ej. Juan Pérez" required>

                <label>Teléfono (10 dígitos):</label>
                <input type="text" id="tel_cli" placeholder="Ej. 5512345678" maxlength="10" 
                    oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>

                <input type="email" id="cor_cli" placeholder="Correo Electrónico">
                <textarea id="dir_cli" placeholder="Dirección completa" required style="width:100%; margin: 10px 0; border: 1px solid #ddd;"></textarea>

                <div style="display:flex; gap:10px;">
                    <div style="flex:1">
                        <label>Fecha Instalación:</label>
                        <input type="date" id="fecha_ins" required>
                    </div>
                    <div style="flex:1">
                        <label>Día de Pago:</label>
                        <input type="number" id="dia_pago" placeholder="1-30" min="1" max="30" required>
                    </div>
                </div>

                <div style="display:flex; gap:10px;">
                    <div style="flex:1">
                        <label>IP:</label>
                        <input type="number" id="ip_cli" placeholder="Ej. 128" min="1" max="254" required>
                    </div>
                    <div style="flex:1">
                        <label>Señal (30-90):</label>
                        <input type="number" id="senal_cli" placeholder="Ej. 60" min="30" max="90" required>
                    </div>
                </div>

                <select id="paquete_cli" onchange="actualizarCosto()" required>
                    <option value="">Selecciona Paquete</option>
                    <option value="5M">5 Megas</option>
                    <option value="8M">8 Megas</option>
                    <option value="16M">16 Megas</option>
                </select>
                <input type="number" id="costo_cli" placeholder="Costo Mensual ($)" required>

                <button type="submit" style="margin-top:15px;">Guardar Cliente</button>
            </form>
        </div>
    </div>
    <script>
        // 1. Verificar si hay una sesión activa
        const usuarioJson = sessionStorage.getItem('usuario');
        if (!usuarioJson) {
            window.location.href = 'index.html';
        }

        const usuario = JSON.parse(usuarioJson);
        document.getElementById('user-name').innerText = usuario.nombre;

        // 2. Lógica de Roles: Mostrar sección de admin si rol_id es 2
        if (usuario.rol === 2) {
            document.getElementById('admin-section').style.display = 'block';
        }

        // 3. Función para cerrar sesión
        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        // 4. Cargar clientes desde el servidor
        async function cargarClientes() {
            try {
                const response = await fetch('http://localhost:3000/api/clientes');
                const clientes = await response.json();
                const tbody = document.getElementById('lista-clientes-body');
                
                tbody.innerHTML = '';
                clientes.forEach(c => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${c.id}</td>
                            <td>${c.nombre_completo}</td>
                            <td>${c.estado_servicio}</td>
                            <td>
                                <button onclick="irAPagar(${c.id})">Registrar Pago</button>
                                ${usuario.rol === 2 ? `<button style="background:red" onclick="eliminarCliente(${c.id})">Eliminar</button>` : ''}
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Error al cargar clientes", error);
            }
        }

        function irAPagar(id) {
            alert("Redirigiendo a pago del cliente " + id);
            // Aquí luego crearemos la lógica de cobro
        }

        cargarClientes();

        // Funciones para el Modal------------
        function mostrarFormularioCliente() {
            document.getElementById('modalCliente').classList.remove('hidden');
        }

        function cerrarModal() {
            document.getElementById('modalCliente').classList.add('hidden');
            document.getElementById('formCliente').reset();
        }

        // Procesar el formulario
        // 1. Configurar la fecha máxima como "HOY" al cargar la página
        window.onload = function() {
            const hoy = new Date().toISOString().split('T')[0];
            document.getElementById('fecha_ins').setAttribute('max', hoy);
            cargarClientes(); // Tu función existente
        };

        // 2. Lógica de validación y envío
        document.getElementById('formCliente').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Recolectar valores
            const nombre = document.getElementById('nom_cli').value.trim();
            const telefono = document.getElementById('tel_cli').value.trim();
            const correo = document.getElementById('cor_cli').value.trim();
            const direccion = document.getElementById('dir_cli').value.trim();
            const fecha = document.getElementById('fecha_ins').value;
            const diaPago = parseInt(document.getElementById('dia_pago').value);
            const ip = parseInt(document.getElementById('ip_cli').value);
            const senal = parseInt(document.getElementById('senal_cli').value);
            const paquete = document.getElementById('paquete_cli').value;
            const costo = document.getElementById('costo_cli').value;

            // --- LISTA DE ERRORES ---
            let errores = [];

            // Validar vacíos y reglas específicas
            if (!nombre) errores.push("- El Nombre es obligatorio.");
            if (!direccion) errores.push("- La Dirección es obligatoria.");
            
            // Validación Teléfono (10 dígitos exactos)
            if (telefono.length !== 10) errores.push("- El Teléfono debe tener exactamente 10 dígitos.");
            
            // Validación Día de Pago
            if (isNaN(diaPago) || diaPago < 1 || diaPago > 30) {
                errores.push("- El Día de Pago debe ser entre 1 y 30.");
            }

            // Validación IP (1 a 254)
            if (isNaN(ip) || ip < 1 || ip > 254) {
                errores.push("- La IP debe ser un número entre 1 y 254.");
            }

            // Validación Señal (30 a 90)
            if (isNaN(senal) || senal < 30 || senal > 90) {
                errores.push("- La Señal debe ser un valor entre 30 y 90.");
            }

            if (!paquete) errores.push("- Debes seleccionar un Paquete.");
            if (!fecha) errores.push("- La Fecha de Instalación es obligatoria.");

            // --- MOSTRAR ERRORES SI EXISTEN ---
            if (errores.length > 0) {
                alert("Por favor corrige los siguientes errores:\n\n" + errores.join("\n"));
                return; // Detenemos el código aquí, no se envía nada al servidor
            }

            // Si todo está bien, preparamos el objeto
            const nuevoCliente = {
                nombre_completo: nombre,
                telefono: telefono,
                correo: correo,
                direccion: direccion,
                fecha_instalacion: fecha,
                dia_pago: diaPago,
                direccion_ip: ip,   // Ahora sí enviamos un número limpio
                señal: senal,       // Número limpio
                paquete: paquete,
                costo_mensual: costo
            };

            // Enviar al servidor
            try {
                const response = await fetch('http://localhost:3000/api/clientes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(nuevoCliente)
                });

                const data = await response.json();

                if (data.success) {
                    alert("¡Cliente guardado correctamente!");
                    cerrarModal();
                    cargarClientes();
                } else {
                    alert("Error del servidor: " + data.error);
                }
            } catch (error) {
                console.error(error);
                alert("No se pudo conectar con el servidor.");
            }
        });

        function actualizarCosto() {
        const paquete = document.getElementById('paquete_cli').value;
        const costoInput = document.getElementById('costo_cli');
        if(paquete === '5M') costoInput.value = 300;
        if(paquete === '8M') costoInput.value = 400;
        if(paquete === '16M') costoInput.value = 600;
    }
    </script>
</body>
</html>
